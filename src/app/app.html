<div class="min-h-screen">
  <header class="sticky top-0 z-40 border-b border-white/60 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-6 py-4 sm:px-10 lg:px-16">
      <a routerLink="/" class="text-lg font-extrabold tracking-tight text-slate-950">
        {{ title() }}
      </a>

      <nav class="flex items-center gap-2 rounded-full border border-slate-200 bg-white p-1 text-sm font-semibold text-slate-600 shadow-sm">
        <a routerLink="/" routerLinkActive="bg-slate-900 text-white" [routerLinkActiveOptions]="{ exact: true }" class="rounded-full px-4 py-2 transition hover:text-slate-900">
          Home
        </a>
        <a routerLink="/dashboard" routerLinkActive="bg-slate-900 text-white" class="rounded-full px-4 py-2 transition hover:text-slate-900">
          Dashboard
        </a>
        <a routerLink="/projects" routerLinkActive="bg-slate-900 text-white" class="rounded-full px-4 py-2 transition hover:text-slate-900">
          Projects
        </a>
      </nav>
    </div>
  </header>

  <router-outlet />
</div>
